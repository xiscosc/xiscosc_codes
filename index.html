<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Xisco Sastre Cabot — Software Engineer</title>

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Xisco Sastre Cabot — Software Engineer" />
    <meta property="og:description" content="Software Engineer based in Mallorca 🌴" />
    <meta property="og:url" content="https://xiscosc.codes" />

    <link
      href="https://fonts.googleapis.com/css2?family=Seaweed+Script&family=Fraunces:opsz,wght@9..144,300..700&family=Geist:wght@100..900&family=Geist+Mono:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💻</text></svg>"
    />
    <script>
      const favicons = ["💻", "🏃", "🚴", "👟"];
      let i = 0;
      setInterval(() => {
        i = (i + 1) % favicons.length;
        document.querySelector("link[rel='icon']").href =
          "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>" +
          favicons[i] +
          "</text></svg>";
      }, 2000);
    </script>
  </head>
  <body class="m-0 min-h-screen">
    <div id="app" class="min-h-screen"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
